apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: gashu-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres

          image: postgres:16-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: mydb

            - name: POSTGRES_USER
              value: myuser

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sistema-mecanica-secret
                  key: POSTGRES_PASSWORD

          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
