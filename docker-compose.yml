version: "3.8"

services:
  api:
    image: kenjigashu/sistema-mecanica:main
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - FIAP_POS_PORT=8080
      - FIAP_POS_EMAIL=kenjigashu@gmail.com
      - FIAP_POS_APP_PASSWORD=izvbemsvglzooife
      - FIAP_POS_SALT=pesomorto
      - FIAP_POS_SECRET=minha_chave_super_secreta_com_32_chars!!
      - ConnectionStrings__Default=Host=db;Port=5432;Database=mydb;Username=myuser;Password=mypassword
    depends_on:
      db:
        condition: service_healthy

  # The PostgreSQL database service
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

